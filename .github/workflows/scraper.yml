name: Daily Enrichment

on:
  schedule:
    - cron: '0 6 * * *' # Every day at 6am UTC
  workflow_dispatch: # Manual trigger

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install firecrawl CLI
        run: npm i -g firecrawl-cli || true

      - name: Run enrichment script
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: npx tsx scripts/enrich.ts

      - name: Commit new logos if any
        run: |
          git config user.name "BuildSaudi Bot"
          git config user.email "bot@buildsaudi.co"
          git add public/logos/ || true
          git diff --staged --quiet || git commit -m "Auto: new company logos from enrichment"
          git push || true
